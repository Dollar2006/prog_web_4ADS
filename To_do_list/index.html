<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Tarefas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Agenda de Tarefas Inteligente</h1>
            <p>Organize suas atividades do dia a dia.</p>
        </header>

        <section class="controls">
            <form id="task-form">
                <input type="text" id="task-name" placeholder="Nome da tarefa" required>
                <select id="task-category" required>
                    <option value="">Categoria...</option>
                    <option value="Trabalho">Trabalho</option>
                    <option value="Estudos">Estudos</option>
                    <option value="Pessoal">Pessoal</option>
                </select>
                <select id="task-priority" required>
                    <option value="">Prioridade...</option>
                    <option value="alta">Alta</option>
                    <option value="media">Média</option>
                    <option value="baixa">Baixa</option>
                </select>
                <input type="date" id="task-date" required>
                <button type="submit">Adicionar Tarefa</button>
            </form>

            <div class="filters">
                <select id="filter-category">
                    <option value="todas">Todas as Categorias</option>
                    <option value="Trabalho">Trabalho</option>
                    <option value="Estudos">Estudos</option>
                    <option value="Pessoal">Pessoal</option>
                </select>
                <select id="sort-tasks">
                    <option value="none">Ordenar por...</option>
                    <option value="date">Data Limite</option>
                    <option value="priority">Prioridade</option>
                </select>
            </div>
        </section>

        <section class="task-list" id="task-list">
            </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
